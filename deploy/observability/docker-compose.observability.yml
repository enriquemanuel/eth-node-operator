# Observability stack for bare metal Ethereum nodes
#
# Runs alongside eth-docker on the same host.
# Start with: docker compose -f docker-compose.observability.yml up -d
#
# Prerequisites:
#   - Copy .env.example to .env and fill in credentials
#   - eth-docker containers named: execution, consensus, mev-boost
#   - /data/execution and /data/consensus mount points exist

networks:
  observability:
    name: observability
    driver: bridge

volumes:
  traefik-acme:
  alloy-data:

services:

  # ── Traefik: TLS termination + reverse proxy ──────────────
  traefik:
    image: traefik:${TRAEFIK_TAG:-v3.3}
    container_name: traefik
    restart: unless-stopped
    networks:
      - observability
    ports:
      - "${TRAEFIK_WEB_HTTP_PORT:-80}:80"
      - "${TRAEFIK_WEB_PORT:-443}:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik-acme:/etc/traefik/acme
    environment:
      CF_DNS_API_TOKEN: ${CF_DNS_API_TOKEN}
      ACME_EMAIL: ${ACME_EMAIL}
      DOMAIN: ${DOMAIN}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
        tag: "traefik"

  # ── node-exporter: host system metrics ───────────────────
  # CPU, memory, disk I/O, network, filesystem, systemd units
  node-exporter:
    image: quay.io/prometheus/node-exporter:v1.8.2
    container_name: node-exporter
    restart: unless-stopped
    network_mode: host
    pid: host
    command:
      - "--path.rootfs=/host"
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
      - "--collector.systemd"
      - "--collector.processes"
      - "--web.listen-address=:9100"
    volumes:
      - /:/host:ro,rslave
      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket:ro
    cap_add:
      - SYS_TIME
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

  # ── ethereum-metrics-exporter: EL+CL protocol metrics ────
  # Sync status, finality, peers, txpool, blob counts, fork choice
  ethereum-metrics-exporter:
    image: ethpandaops/ethereum-metrics-exporter:latest
    container_name: ethereum-metrics-exporter
    restart: unless-stopped
    network_mode: host
    command:
      - "--config=/etc/ethereum-metrics-exporter/config.yaml"
      - "--metrics-port=9191"
    volumes:
      - ./ethereum-metrics-exporter/config.yaml:/etc/ethereum-metrics-exporter/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      EL_RPC_URL: ${EL_RPC_URL:-http://localhost:8545}
      CL_REST_URL: ${CL_REST_URL:-http://localhost:5052}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9191/metrics"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ── Grafana Alloy: unified metrics scraper + log shipper ──
  # Replaces: Prometheus agent + Promtail + OTEL collector
  alloy:
    image: grafana/alloy:v1.8.1
    container_name: alloy
    restart: unless-stopped
    network_mode: host
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=0.0.0.0:12345
      - --stability.level=generally-available
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy-data:/var/lib/alloy/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log:ro
    environment:
      NODE_NAME: ${NODE_NAME}
      CLUSTER_NAME: ${CLUSTER_NAME}
      ENVIRONMENT: ${ENVIRONMENT}
      MIMIR_REMOTE_WRITE_URL: ${MIMIR_REMOTE_WRITE_URL}
      MIMIR_USERNAME: ${MIMIR_USERNAME}
      MIMIR_PASSWORD: ${MIMIR_PASSWORD}
      LOKI_URL: ${LOKI_URL}
      LOKI_USERNAME: ${LOKI_USERNAME}
      LOKI_PASSWORD: ${LOKI_PASSWORD}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:12345/-/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
