# Traefik dynamic configuration — Beacon Node HTTP API
#
# Routes inbound HTTPS from the Lighthouse VC (on EKS) to the local
# beacon node REST API on localhost:5052.
#
# The beacon node port :5052 is NEVER exposed externally.
# All external access goes through this HTTPS route.
#
# Two layers of access control:
#   1. UFW: allows :443 only from VC_GATEWAY_CIDRS (EKS NAT egress IPs)
#      Configured via spec.network.vcGateways in the node spec.
#   2. Traefik IPAllowList middleware: same IPs, second enforcement layer.
#
# Environment variables (set in .env):
#   BEACON_DOMAIN     e.g. beacon.bare-metal-01.validators.example.com
#   VC_GATEWAY_CIDRS  comma-separated EKS NAT gateway IPs or CIDRs
#                     e.g. "10.0.1.0/24,52.1.2.3/32"

http:
  routers:
    beacon-node:
      rule: "Host(`${BEACON_DOMAIN}`)"
      entryPoints:
        - websecure
      service: beacon-node
      tls:
        certResolver: cloudflare
      middlewares:
        - vc-gateway-allowlist
        - beacon-headers

  services:
    beacon-node:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:5052"
        healthCheck:
          path: /eth/v1/node/health
          interval: "15s"
          timeout: "5s"

  middlewares:
    # IP allowlist: only the VC gateway IPs may reach this route.
    # VC_GATEWAY_CIDRS is a comma-separated list from .env
    # e.g. "10.0.1.0/24,52.1.2.3/32"
    vc-gateway-allowlist:
      ipAllowList:
        sourceRange:
          # Traefik v3: comma-separated list from env var isn't directly
          # supported in YAML — list each CIDR explicitly here.
          # OR use the dynamic config Traefik v3 env substitution:
          - "${VC_GATEWAY_CIDR_1}"
          - "${VC_GATEWAY_CIDR_2}"
          # Add more as needed. Unused entries can be set to 0.0.0.0/32
          # and they won't match any real traffic.

    beacon-headers:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        contentTypeNosniff: true
        customResponseHeaders:
          X-Robots-Tag: "noindex, nofollow"
