---
# bootstrap.yaml — one-time setup of ethagent on a bare metal host
# Run with: ansible-playbook -i hosts.ini bootstrap.yaml --limit <host>
#
# Prerequisites:
#   - SSH access to host
#   - sudo/root access
#   - ansible-playbook installed locally

- name: Bootstrap ethagent on bare metal Ethereum node
  hosts: all
  become: yes
  vars:
    ethagent_version: "{{ lookup('env', 'ETHAGENT_VERSION') | default('latest') }}"
    ethagent_binary: "/usr/local/bin/ethagent"
    ethagent_config_dir: "/etc/ethagent"
    ethagent_node_name: "{{ inventory_hostname }}"
    el_endpoint: "http://127.0.0.1:8545"
    cl_endpoint: "http://127.0.0.1:5052"

  tasks:
    - name: Ensure required packages are installed
      apt:
        name:
          - curl
          - ufw
          - chrony
        state: present
        update_cache: yes

    - name: Create ethagent config directory
      file:
        path: "{{ ethagent_config_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0750"

    - name: Copy ethagent binary
      copy:
        src: "{{ playbook_dir }}/../../dist/ethagent-linux-amd64"
        dest: "{{ ethagent_binary }}"
        owner: root
        group: root
        mode: "0755"
      notify: restart ethagent

    - name: Copy node spec
      copy:
        src: "{{ playbook_dir }}/../../inventory/nodes/{{ inventory_hostname }}.yaml"
        dest: "{{ ethagent_config_dir }}/node.yaml"
        owner: root
        group: root
        mode: "0640"
      notify: restart ethagent

    - name: Install systemd service
      copy:
        src: "{{ playbook_dir }}/../systemd/ethagent.service"
        dest: /etc/systemd/system/ethagent.service
        owner: root
        group: root
        mode: "0644"
      notify:
        - reload systemd
        - restart ethagent

    - name: Enable and start ethagent
      systemd:
        name: ethagent
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Wait for ethagent to be ready
      uri:
        url: "http://localhost:9000/healthz"
        method: GET
        status_code: 200
      retries: 10
      delay: 3
      register: result
      until: result.status == 200

    - name: Verify ethagent is reporting status
      uri:
        url: "http://localhost:9000/status"
        method: GET
        status_code: 200
        return_content: yes
      register: status_response

    - name: Show node status
      debug:
        msg: "ethagent is running: {{ status_response.content | from_json | json_query('phase') }}"

  handlers:
    - name: reload systemd
      systemd:
        daemon_reload: yes

    - name: restart ethagent
      systemd:
        name: ethagent
        state: restarted
