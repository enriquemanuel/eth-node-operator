---
# bootstrap.yaml — THE ONLY Ansible playbook
#
# Does exactly three things:
#   1. Installs Docker on the host
#   2. Copies the ethagent binary
#   3. Installs and starts the systemd service
#
# Everything else (JWT, disk setup, firewall, observability stack,
# eth client management) is handled by ethagent itself.
#
# Run once per new node:
#   ansible-playbook -i hosts.ini bootstrap.yaml --limit <host>

- name: Bootstrap ethagent
  hosts: all
  become: yes
  vars:
    ethagent_binary: "/usr/local/bin/ethagent"
    ethagent_config_dir: "/etc/ethagent"

  tasks:

    # ── 1. Docker ──────────────────────────────────────────
    - name: Install Docker dependencies
      apt:
        name: [ca-certificates, curl, gnupg]
        state: present
        update_cache: yes

    - name: Add Docker GPG key
      shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | \
          gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Add Docker apt repository
      shell: |
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
          https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" | \
          tee /etc/apt/sources.list.d/docker.list > /dev/null
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Install Docker CE + compose plugin
      apt:
        name: [docker-ce, docker-ce-cli, containerd.io, docker-compose-plugin]
        state: present
        update_cache: yes

    - name: Start and enable Docker
      systemd:
        name: docker
        enabled: yes
        state: started

    # ── 2. ethagent binary ────────────────────────────────
    - name: Create config directory
      file:
        path: "{{ ethagent_config_dir }}"
        state: directory
        owner: root
        mode: "0750"

    - name: Copy ethagent binary
      copy:
        src: "{{ playbook_dir }}/../../dist/ethagent-linux-amd64"
        dest: "{{ ethagent_binary }}"
        owner: root
        mode: "0755"
      notify: restart ethagent

    - name: Copy node spec
      copy:
        src: "{{ playbook_dir }}/../../inventory/clusters/{{ inventory_hostname }}.yaml"
        dest: "{{ ethagent_config_dir }}/node.yaml"
        owner: root
        mode: "0640"
      notify: restart ethagent

    # ── 3. systemd service ────────────────────────────────
    - name: Install ethagent service
      copy:
        src: "{{ playbook_dir }}/../systemd/ethagent.service"
        dest: /etc/systemd/system/ethagent.service
        mode: "0644"
      notify: [reload systemd, restart ethagent]

    - name: Enable and start ethagent
      systemd:
        name: ethagent
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Wait for ethagent healthz
      uri:
        url: "http://localhost:9000/healthz"
        status_code: 200
      retries: 10
      delay: 3
      until: result.status == 200
      register: result

  handlers:
    - name: reload systemd
      systemd:
        daemon_reload: yes
    - name: restart ethagent
      systemd:
        name: ethagent
        state: restarted
