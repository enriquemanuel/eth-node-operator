---
# bootstrap.yaml — one-time setup of ethagent on a bare metal host
# Run with: ansible-playbook -i hosts.ini bootstrap.yaml --limit <host>

- name: Bootstrap ethagent on bare metal Ethereum node
  hosts: all
  become: yes
  vars:
    ethagent_binary: "/usr/local/bin/ethagent"
    ethagent_config_dir: "/etc/ethagent"
    jwt_secret_path: "/data/jwtsecret"
    data_dir: "/data"

  tasks:
    - name: Ensure required packages are installed
      apt:
        name:
          - curl
          - ufw
          - chrony
          - openssl
          - smartmontools
        state: present
        update_cache: yes

    - name: Create data directory
      file:
        path: "{{ data_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0750"

    - name: Create ethagent config directory
      file:
        path: "{{ ethagent_config_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0750"

    # ── JWT Secret ─────────────────────────────────────────
    # Generate once using openssl — idempotent, never overwrites.
    # Format: "0x" + 64 lowercase hex chars (32 bytes)
    # eth-docker compatible — both EL and CL containers mount this file.

    - name: Check if JWT secret already exists
      stat:
        path: "{{ jwt_secret_path }}"
      register: jwt_file

    - name: Generate JWT secret (first time only)
      shell: |
        echo "0x$(openssl rand -hex 32)" > {{ jwt_secret_path }}
        chmod 640 {{ jwt_secret_path }}
        chown root:root {{ jwt_secret_path }}
      when: not jwt_file.stat.exists

    - name: Validate JWT secret format
      shell: |
        SECRET=$(cat {{ jwt_secret_path }} | tr -d '[:space:]')
        if [[ ! "$SECRET" =~ ^0x[0-9a-f]{64}$ ]]; then
          echo "INVALID: $SECRET"
          exit 1
        fi
        echo "OK: ${#SECRET} chars"
      register: jwt_check
      changed_when: false

    - name: Show JWT secret status
      debug:
        msg: "JWT secret {{ 'created' if not jwt_file.stat.exists else 'already exists' }} at {{ jwt_secret_path }} — {{ jwt_check.stdout }}"

    # ── ethagent binary ────────────────────────────────────

    - name: Copy ethagent binary
      copy:
        src: "{{ playbook_dir }}/../../dist/ethagent-linux-amd64"
        dest: "{{ ethagent_binary }}"
        owner: root
        group: root
        mode: "0755"
      notify: restart ethagent

    - name: Copy node spec
      copy:
        src: "{{ playbook_dir }}/../../inventory/nodes/{{ inventory_hostname }}.yaml"
        dest: "{{ ethagent_config_dir }}/node.yaml"
        owner: root
        group: root
        mode: "0640"
      notify: restart ethagent

    - name: Install systemd service
      copy:
        src: "{{ playbook_dir }}/../systemd/ethagent.service"
        dest: /etc/systemd/system/ethagent.service
        owner: root
        group: root
        mode: "0644"
      notify:
        - reload systemd
        - restart ethagent

    - name: Enable and start ethagent
      systemd:
        name: ethagent
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Wait for ethagent to be ready
      uri:
        url: "http://localhost:9000/healthz"
        method: GET
        status_code: 200
      retries: 10
      delay: 3
      register: result
      until: result.status == 200

    - name: Show node status
      uri:
        url: "http://localhost:9000/status"
        method: GET
        return_content: yes
      register: status

    - name: Print status
      debug:
        msg: "ethagent running — phase: {{ (status.content | from_json).phase }}"

  handlers:
    - name: reload systemd
      systemd:
        daemon_reload: yes

    - name: restart ethagent
      systemd:
        name: ethagent
        state: restarted
