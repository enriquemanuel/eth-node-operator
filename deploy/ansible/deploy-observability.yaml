---
# deploy-observability.yaml — deploy Alloy + ethereum-metrics-exporter + Traefik
# on each bare metal node alongside eth-docker.
#
# Run with: ansible-playbook -i hosts.ini deploy-observability.yaml --limit <host>
#
# Prerequisites:
#   - ethagent bootstrap already completed (bootstrap.yaml ran)
#   - Docker and docker compose plugin installed
#   - .env file created from .env.example and populated

- name: Deploy observability stack on bare metal Ethereum node
  hosts: all
  become: yes
  vars:
    obs_dir: /opt/eth-observability
    obs_src: "{{ playbook_dir }}/../observability"

  tasks:
    - name: Create observability directory
      file:
        path: "{{ obs_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0750"

    - name: Copy observability stack files
      copy:
        src: "{{ obs_src }}/"
        dest: "{{ obs_dir }}/"
        owner: root
        group: root
        mode: preserve
      notify: restart observability

    - name: Check .env exists
      stat:
        path: "{{ obs_dir }}/.env"
      register: env_file

    - name: Warn if .env is missing
      debug:
        msg: |
          WARNING: {{ obs_dir }}/.env does not exist.
          Copy .env.example to .env and fill in MIMIR/LOKI credentials before starting.
      when: not env_file.stat.exists

    - name: Create acme directory for Traefik certificates
      file:
        path: "{{ obs_dir }}/traefik/acme"
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Create acme.json for Traefik (must be 600)
      file:
        path: "{{ obs_dir }}/traefik/acme/acme.json"
        state: touch
        owner: root
        group: root
        mode: "0600"

    - name: Pull observability images
      community.docker.docker_compose_v2:
        project_src: "{{ obs_dir }}"
        files:
          - docker-compose.observability.yml
        state: present
        pull: always
      when: env_file.stat.exists

    - name: Start observability stack
      community.docker.docker_compose_v2:
        project_src: "{{ obs_dir }}"
        files:
          - docker-compose.observability.yml
        state: present
      when: env_file.stat.exists
      register: compose_result

    - name: Wait for Alloy to be ready
      uri:
        url: "http://localhost:12345/-/ready"
        method: GET
        status_code: 200
      retries: 15
      delay: 5
      register: alloy_ready
      until: alloy_ready.status == 200
      when: env_file.stat.exists

    - name: Wait for ethereum-metrics-exporter to be ready
      uri:
        url: "http://localhost:9191/metrics"
        method: GET
        status_code: 200
      retries: 15
      delay: 5
      register: eme_ready
      until: eme_ready.status == 200
      when: env_file.stat.exists

    - name: Verify node-exporter is up
      uri:
        url: "http://localhost:9100/metrics"
        method: GET
        status_code: 200
      register: ne_ready
      when: env_file.stat.exists

    - name: Show stack status
      debug:
        msg: |
          Observability stack status:
            node-exporter:              {{ 'OK' if ne_ready.status == 200 else 'FAILED' }}
            ethereum-metrics-exporter:  {{ 'OK' if eme_ready.status == 200 else 'FAILED' }}
            alloy:                      {{ 'OK' if alloy_ready.status == 200 else 'FAILED' }}
      when: env_file.stat.exists

  handlers:
    - name: restart observability
      community.docker.docker_compose_v2:
        project_src: "{{ obs_dir }}"
        files:
          - docker-compose.observability.yml
        state: restarted
