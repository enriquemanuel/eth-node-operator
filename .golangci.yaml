run:
  timeout: 5m
  modules-download-mode: vendor

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - bodyclose
    - noctx
    - unconvert
    - unparam

linters-settings:
  goimports:
    local-prefixes: github.com/enriquemanuel/eth-node-operator

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - unparam
