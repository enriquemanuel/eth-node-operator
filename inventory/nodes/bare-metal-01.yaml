name: bare-metal-01
host: 10.1.1.1
port: 9000
labels:
  region: eu-west
  provider: bare-metal
  role: validator
  rack: "01"
profiles:
  - mainnet-base
  - observability-full
  - mev-standard

spec:
  execution:
    image: ethereum/client-go:v1.14.8
    flags:
      cache: "8192"
      # JWT secret path — shared with consensus layer
      authrpc.jwtsecret: /data/jwtsecret

  consensus:
    image: sigp/lighthouse:v5.3.0
    flags:
      execution-jwt: /data/jwtsecret

  system:
    disk:
      - device: /dev/nvme0n1p1
        mountPath: /data
        fsType: ext4
        options: [noatime, nodiratime]

  # JWT secret — generated once on first ethagent startup, never rotated automatically.
  # Path is shared between EL and CL containers via host bind mount.
  network:
    firewall:
      rules: []  # Additional node-specific rules on top of profile rules

  maintenance:
    window:
      schedule: "0 2 * * 0"
    autoUpgrade:
      enabled: false
