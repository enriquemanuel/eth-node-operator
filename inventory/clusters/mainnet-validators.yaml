name: mainnet-validators
description: >
  Production Ethereum validator infrastructure.
  Bare metal nodes (OVH) run: EL + CL beacon node + MEV-Boost.
  Lighthouse VC (EKS) connects via plain HTTP to :5052 on each node.
  UFW restricts :5052 to EKS NAT gateway IPs only.
  Route 53 provides human-readable hostnames — no IP memorisation.

profiles:
  - mainnet-base
  - observability-full
  - mev-standard

defaultPort: 19000

# Route 53 public hosted zone — same for all nodes.
# The agent auto-derives hostnames: {nodeName}-{elClient}.{zone}
# Example: bare-metal-01-geth.validators.example.com → OVH public IP
#          bare-metal-02-nethermind.validators.example.com → OVH public IP
#
# Lighthouse VC config:
#   --beacon-nodes=http://bare-metal-01-geth.validators.example.com:5052,
#                  http://bare-metal-02-nethermind.validators.example.com:5052

nodes:
  # ── Snapshot server ─────────────────────────────────────────────────
  - name: snapshot-server-01
    host: 10.1.1.10
    labels: { role: snapshot-server }
    profiles: [geth-lighthouse, snapshot-server]
    spec:
      mev:
        enabled: false
      snapshot:
        enabled: false
      network:
        route53:
          zoneId: Z1234567890ABC
          zone: validators.example.com
        # No vcGateways — snapshot server doesn't expose :5052 to EKS

  # ── Validator beacon nodes ───────────────────────────────────────────
  # vcGateways → UFW: allow :5052 from each EKS NAT gateway IP.
  # The VC connects to the derived hostname over plain HTTP.
  #
  # How to find your EKS NAT gateway IPs:
  #   aws ec2 describe-nat-gateways --filter Name=state,Values=available \
  #     --query 'NatGateways[].NatGatewayAddresses[].PublicIp'

  - name: bare-metal-01
    host: 10.1.1.1
    labels: { rack: "01" }
    profiles: [geth-lighthouse]
    spec:
      network:
        route53:
          zoneId: Z1234567890ABC
          zone: validators.example.com
        vcGateways:
          - "18.x.x.x/32"   # EKS us-east-1a NAT gateway EIP
          - "52.x.x.x/32"   # EKS us-east-1b NAT gateway EIP
        # Restrict ethagent :19000 to your bastion/jump host only.
        # This plus the API key = two independent layers of protection.
        # Find your bastion IP: dig +short mybastion.example.com
        managementCIDRs:
          - "10.1.0.5/32"   # bastion host
      snapshot:
        provider: self-hosted
        url: http://10.1.1.10:8888
        network: mainnet
        elEnabled: true
        clEnabled: true

  - name: bare-metal-02
    host: 10.1.1.2
    labels: { rack: "01" }
    profiles: [nethermind-teku]
    spec:
      network:
        route53:
          zoneId: Z1234567890ABC
          zone: validators.example.com
        vcGateways:
          - "18.x.x.x/32"
          - "52.x.x.x/32"
        managementCIDRs:
          - "10.1.0.5/32"   # bastion host
      snapshot:
        provider: self-hosted
        url: http://10.1.1.10:8888
        network: mainnet
        elEnabled: true
        clEnabled: true
      maintenance:
        window:
          schedule: "0 3 * * 0"

  # ── Template: new node ───────────────────────────────────────────────
  # Copy, fill name/host/profiles, done.
  # Hostname is auto-derived: bare-metal-03-reth.validators.example.com
  #
  # - name: bare-metal-03
  #   host: 10.1.1.3
  #   profiles: [reth-lighthouse]
  #   spec:
  #     network:
  #       route53:
  #         zoneId: Z1234567890ABC
  #         zone: validators.example.com
  #       vcGateways:
  #         - "18.x.x.x/32"
  #         - "52.x.x.x/32"
  #     snapshot:
  #       provider: self-hosted
  #       url: http://10.1.1.10:8888
  #       network: mainnet
  #       elEnabled: true
  #       clEnabled: true
