name: mainnet-validators
description: >
  Production Ethereum validator infrastructure.
  Bare metal nodes run: EL + CL beacon node + MEV-Boost.
  Lighthouse VC runs on EKS and connects to beacon nodes via HTTPS
  (Traefik TLS termination on :443, proxied to localhost:5052).
  Port :5052 is never exposed externally.

profiles:
  - mainnet-base
  - observability-full
  - mev-standard

defaultPort: 19000

nodes:
  # ── Snapshot server ─────────────────────────────────────────────────
  - name: snapshot-server-01
    host: 10.1.1.10
    labels: { role: snapshot-server }
    profiles: [geth-lighthouse, snapshot-server]
    spec:
      mev:
        enabled: false
      snapshot:
        enabled: false
      # Snapshot server doesn't need VC access
      network:
        vcGateways: []

  # ── Validator beacon nodes ───────────────────────────────────────────
  # vcGateways: EKS NAT gateway egress IPs for this region.
  # These drive both UFW :443 rules and Traefik IPAllowList middleware.
  # Lighthouse VC on EKS connects to: https://beacon.bare-metal-01.example.com
  #                                    https://beacon.bare-metal-02.example.com

  - name: bare-metal-01
    host: 10.1.1.1
    labels: { rack: "01" }
    profiles: [geth-lighthouse]
    spec:
      network:
        vcGateways:
          - "10.0.1.0/24"    # EKS us-east-1a NAT gateway
          - "10.0.2.0/24"    # EKS us-east-1b NAT gateway
      snapshot:
        provider: self-hosted
        url: http://10.1.1.10:8888
        network: mainnet
        elEnabled: true
        clEnabled: true

  - name: bare-metal-02
    host: 10.1.1.2
    labels: { rack: "01" }
    profiles: [nethermind-teku]
    spec:
      network:
        vcGateways:
          - "10.0.1.0/24"
          - "10.0.2.0/24"
      snapshot:
        provider: self-hosted
        url: http://10.1.1.10:8888
        network: mainnet
        elEnabled: true
        clEnabled: true
      maintenance:
        window:
          schedule: "0 3 * * 0"

