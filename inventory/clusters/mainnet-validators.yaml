name: mainnet-validators
description: >
  Production Ethereum validator infrastructure.
  Includes a dedicated snapshot server so nodes sync from internal storage.

profiles:
  - mainnet-base
  - observability-full
  - mev-standard
  - lighthouse-vc-web3signer

defaultPort: 9000

nodes:
  # ── Snapshot server ─────────────────────────────────────────────────
  # One dedicated node that stays fully synced, takes daily snapshots,
  # and serves them to all other nodes. Saves downloading from ethpandaops
  # repeatedly (especially important when spinning up many nodes at once).
  - name: snapshot-server-01
    host: 10.1.1.10
    labels: { role: snapshot-server }
    profiles: [geth-lighthouse, snapshot-server]
    # snapshot-server nodes do NOT run validators or MEV-Boost
    spec:
      mev:
        enabled: false
      validator:
        enabled: false
      snapshot:
        enabled: false   # this node IS the source, not a consumer

  # ── Validator nodes ─────────────────────────────────────────────────
  # All consume snapshots from the internal snapshot server.
  # No ethpandaops download needed after snapshot-server-01 is synced.

  - name: bare-metal-01
    host: 10.1.1.1
    labels: { rack: "01" }
    profiles: [geth-lighthouse]
    spec:
      snapshot:
        provider: self-hosted
        url: http://10.1.1.10:8888
        network: mainnet
        elEnabled: true
        clEnabled: true
      validator:
        beaconNodes:
          - http://127.0.0.1:5052
          - http://10.1.1.2:5052

  - name: bare-metal-02
    host: 10.1.1.2
    labels: { rack: "01" }
    profiles: [nethermind-teku]
    spec:
      snapshot:
        provider: self-hosted
        url: http://10.1.1.10:8888
        network: mainnet
        elEnabled: true
        clEnabled: true
      validator:
        beaconNodes:
          - http://127.0.0.1:5052
          - http://10.1.1.1:5052
      maintenance:
        window:
          schedule: "0 3 * * 0"

