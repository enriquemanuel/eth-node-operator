name: mainnet-validators
description: >
  Production Ethereum validator infrastructure.
  Bare metal nodes run EL + CL beacon node + MEV-Boost.
  Validator client (Lighthouse VC + Web3Signer) runs separately on EKS
  and connects to these beacon nodes via the standard Beacon API (:5052).

profiles:
  - mainnet-base
  - observability-full
  - mev-standard

defaultPort: 9000

nodes:
  # ── Snapshot server ─────────────────────────────────────────────────
  - name: snapshot-server-01
    host: 10.1.1.10
    labels: { role: snapshot-server }
    profiles: [geth-lighthouse, snapshot-server]
    spec:
      mev:
        enabled: false
      snapshot:
        enabled: false   # this node IS the source, not a consumer

  # ── Validator beacon nodes ───────────────────────────────────────────
  # Each runs: EL + CL beacon node + MEV-Boost
  # Lighthouse VC on EKS connects to :5052 on these nodes for attestations

  - name: bare-metal-01
    host: 10.1.1.1
    labels: { rack: "01" }
    profiles: [geth-lighthouse]
    spec:
      snapshot:
        provider: self-hosted
        url: http://10.1.1.10:8888
        network: mainnet
        elEnabled: true
        clEnabled: true

  - name: bare-metal-02
    host: 10.1.1.2
    labels: { rack: "01" }
    profiles: [nethermind-teku]
    spec:
      snapshot:
        provider: self-hosted
        url: http://10.1.1.10:8888
        network: mainnet
        elEnabled: true
        clEnabled: true
      maintenance:
        window:
          schedule: "0 3 * * 0"

