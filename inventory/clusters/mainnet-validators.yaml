name: mainnet-validators
description: >
  Production Ethereum validator infrastructure.
  Bare metal nodes run: EL + CL beacon node + MEV-Boost.
  Lighthouse VC connects via Cloudflare Tunnel (outbound-only, no inbound ports).
  DNS is managed automatically by the ethagent on each node.

profiles:
  - mainnet-base
  - observability-full
  - mev-standard
  - cloudflare-tunnel

defaultPort: 19000

nodes:
  # ── Snapshot server ─────────────────────────────────────────────────
  - name: snapshot-server-01
    host: 10.1.1.10
    labels: { role: snapshot-server }
    profiles: [geth-lighthouse, snapshot-server]
    spec:
      mev:
        enabled: false
      snapshot:
        enabled: false
      network:
        cloudflare:
          domain: validators.example.com
          accountId: "${CF_ACCOUNT_ID}"
          zoneId: "${CF_ZONE_ID}"
          nodeSubdomain: snapshot-server-01
          clSubdomain: snapshot-server-01-cl
          tunnelName: eth-snapshot-server-01
          accessPolicy: service-token

  # ── Validator beacon nodes ───────────────────────────────────────────
  # Lighthouse VC connects to:
  #   https://bare-metal-01-cl.validators.example.com
  #   https://bare-metal-02-cl.validators.example.com
  # These are Cloudflare Tunnel endpoints — no :443 inbound port needed.

  - name: bare-metal-01
    host: 10.1.1.1
    labels: { rack: "01" }
    profiles: [geth-lighthouse]
    spec:
      network:
        cloudflare:
          domain: validators.example.com
          accountId: "${CF_ACCOUNT_ID}"
          zoneId: "${CF_ZONE_ID}"
          nodeSubdomain: bare-metal-01       # A: bare-metal-01.validators.example.com → IP
          clSubdomain: bare-metal-01-cl      # CNAME: bare-metal-01-cl.validators.example.com → tunnel
          tunnelName: eth-bare-metal-01
          accessPolicy: service-token        # Cloudflare Access: only VC service token
      snapshot:
        provider: self-hosted
        url: http://10.1.1.10:8888
        network: mainnet
        elEnabled: true
        clEnabled: true

  - name: bare-metal-02
    host: 10.1.1.2
    labels: { rack: "01" }
    profiles: [nethermind-teku]
    spec:
      network:
        cloudflare:
          domain: validators.example.com
          accountId: "${CF_ACCOUNT_ID}"
          zoneId: "${CF_ZONE_ID}"
          nodeSubdomain: bare-metal-02
          clSubdomain: bare-metal-02-cl
          tunnelName: eth-bare-metal-02
          accessPolicy: service-token
      snapshot:
        provider: self-hosted
        url: http://10.1.1.10:8888
        network: mainnet
        elEnabled: true
        clEnabled: true
      maintenance:
        window:
          schedule: "0 3 * * 0"

