name: mainnet-validators
description: >
  Production Ethereum validator infrastructure.
  Infrastructure + snapshot + validator profiles apply to all nodes.
  Each node picks exactly one client pair. Adding a node = 2 lines.

profiles:
  - mainnet-base           # kernel, disk (RAID0), firewall, packages
  - observability-full     # Alloy + all exporters
  - mev-standard           # mev-boost + relay list
  - snapshot-restore       # stream latest snapshot if datadir is empty
  - lighthouse-vc-web3signer  # Lighthouse VC → Web3Signer for 45k keys

defaultPort: 9000

nodes:
  # Best practice: no single client pair > 33% of your validator set.
  # Spread EL and CL independently. The lighthouse-vc connects to all BNs
  # via standard Beacon API regardless of which CL client they run.

  - name: bare-metal-01
    host: 10.1.1.1
    labels: { rack: "01" }
    profiles: [geth-lighthouse]
    spec:
      validator:
        beaconNodes:
          - http://127.0.0.1:5052       # local lighthouse BN (primary)
          - http://10.1.1.2:5052        # bare-metal-02 teku BN (fallback)

  - name: bare-metal-02
    host: 10.1.1.2
    labels: { rack: "01" }
    profiles: [nethermind-teku]
    spec:
      validator:
        beaconNodes:
          - http://127.0.0.1:5052       # local teku BN (primary)
          - http://10.1.1.1:5052        # bare-metal-01 lighthouse BN (fallback)
      maintenance:
        window:
          schedule: "0 3 * * 0"        # offset 1h from bare-metal-01

