name: nethermind-teku
# Nethermind (EL) + Teku (CL)
# Both are JVM/.NET enterprise clients. Strong SOC 2 posture.
spec:
  execution:
    client: nethermind
    image: nethermind/nethermind:v1.26.0
    dataDir: /data/execution
    flags:
      config: mainnet
      datadir: /data/execution
      JsonRpc.Enabled: "true"
      JsonRpc.Host: "127.0.0.1"
      JsonRpc.Port: "8545"
      JsonRpc.EngineHost: "127.0.0.1"
      JsonRpc.EnginePort: "8551"
      JsonRpc.JwtSecretFile: /data/jwtsecret
      Sync.SnapSync: "true"
      Network.MaxActivePeers: "100"
      Metrics.Enabled: "true"
      Metrics.ExposePort: "6060"
    ports:
      http: 8545
      p2p: 30303
      metrics: 6060

  consensus:
    client: teku
    image: consensys/teku:24.10.0
    dataDir: /data/consensus
    flags:
      network: mainnet
      ee-endpoint: http://127.0.0.1:8551
      ee-jwt-secret-file: /data/jwtsecret
      initial-state: https://beaconstate.ethstaker.cc
      rest-api-enabled: "true"
      rest-api-interface: "127.0.0.1"
      rest-api-port: "5052"
      metrics-enabled: "true"
      metrics-interface: "127.0.0.1"
      metrics-port: "8008"
      p2p-port: "9000"
    ports:
      http: 5052
      p2p: 9000
      metrics: 8008
