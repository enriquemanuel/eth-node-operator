name: geth-teku
# Geth (EL) + Teku (CL)
# Teku is Java-based (ConsenSys). Strong enterprise adoption.
# Pairs well with Besu for a full ConsenSys stack, or with Geth.
spec:
  execution:
    client: geth
    image: ethereum/client-go:v1.14.8
    dataDir: /data/execution
    flags:
      syncmode: snap
      cache: "4096"
      maxpeers: "100"
      http: "true"
      http.addr: "127.0.0.1"
      http.port: "8545"
      http.api: "eth,net,web3,engine,admin"
      authrpc.addr: "127.0.0.1"
      authrpc.port: "8551"
      authrpc.jwtsecret: /data/jwtsecret
      metrics: "true"
      metrics.addr: "127.0.0.1"
      metrics.port: "6060"
    ports:
      http: 8545
      p2p: 30303
      metrics: 6060

  consensus:
    client: teku
    image: consensys/teku:24.10.0
    dataDir: /data/consensus
    flags:
      network: mainnet
      ee-endpoint: http://127.0.0.1:8551
      ee-jwt-secret-file: /data/jwtsecret
      initial-state: https://beaconstate.ethstaker.cc
      rest-api-enabled: "true"
      rest-api-interface: "127.0.0.1"
      rest-api-port: "5052"
      metrics-enabled: "true"
      metrics-interface: "127.0.0.1"
      metrics-port: "5054"
      p2p-port: "9000"
      p2p-peer-upper-bound: "100"
      log-destination: CONSOLE
    ports:
      http: 5052
      p2p: 9000
      metrics: 5054

  network:
    firewall:
      rules:
        - description: "Geth metrics (localhost only)"
          port: 6060
          proto: tcp
          direction: inbound
          source: "127.0.0.1"
          action: allow
        - description: "Teku metrics (localhost only)"
          port: 5054
          proto: tcp
          direction: inbound
          source: "127.0.0.1"
          action: allow
