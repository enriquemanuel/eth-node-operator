name: nethermind-lighthouse
# Nethermind (EL) + Lighthouse (CL)
# Nethermind is C#/.NET — strong performance on Windows/Linux.
# Good for client diversity; different codebase from Geth family.
spec:
  execution:
    client: nethermind
    image: nethermind/nethermind:v1.26.0
    dataDir: /data/execution
    flags:
      config: mainnet
      datadir: /data/execution
      JsonRpc.Enabled: "true"
      JsonRpc.Host: "127.0.0.1"
      JsonRpc.Port: "8545"
      JsonRpc.WebSocketsPort: "8546"
      JsonRpc.EngineHost: "127.0.0.1"
      JsonRpc.EnginePort: "8551"
      JsonRpc.JwtSecretFile: /data/jwtsecret
      Sync.SnapSync: "true"
      Network.MaxActivePeers: "100"
      Metrics.Enabled: "true"
      Metrics.ExposePort: "6060"
    ports:
      http: 8545
      p2p: 30303
      metrics: 6060

  consensus:
    client: lighthouse
    image: sigp/lighthouse:v5.3.0
    dataDir: /data/consensus
    flags:
      network: mainnet
      execution-endpoint: http://127.0.0.1:8551
      execution-jwt: /data/jwtsecret
      checkpoint-sync-url: https://mainnet.checkpoint.sigp.io
      http: "true"
      http-address: "127.0.0.1"
      http-port: "5052"
      metrics: "true"
      metrics-address: "127.0.0.1"
      metrics-port: "5054"
      port: "9000"
    ports:
      http: 5052
      p2p: 9000
      metrics: 5054

  network:
    firewall:
      rules:
        - description: "Nethermind metrics (localhost only)"
          port: 6060
          proto: tcp
          direction: inbound
          source: "127.0.0.1"
          action: allow
