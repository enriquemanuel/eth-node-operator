name: reth-lighthouse
# Reth (EL) + Lighthouse (CL)
# Reth is Rust-based (Paradigm). Fastest sync times, lowest disk usage.
# Production-ready as of v1.x. Excellent choice for new nodes.
# Uses Reth's native exex (execution extensions) architecture.
spec:
  execution:
    client: reth
    image: ghcr.io/paradigmxyz/reth:v1.1.0
    dataDir: /data/execution
    flags:
      chain: mainnet
      datadir: /data/execution
      http: "true"
      http.addr: "127.0.0.1"
      http.port: "8545"
      http.api: "eth,net,web3,engine,admin,txpool"
      ws: "true"
      ws.addr: "127.0.0.1"
      ws.port: "8546"
      authrpc.addr: "127.0.0.1"
      authrpc.port: "8551"
      authrpc.jwtsecret: /data/jwtsecret
      # Full sync is Reth's default and fastest; snap sync also available
      # full: ""
      metrics: "127.0.0.1:6060"
      max-outbound-peers: "100"
      max-inbound-peers: "30"
      log.stdout.format: terminal
    ports:
      http: 8545
      p2p: 30303
      metrics: 6060

  consensus:
    client: lighthouse
    image: sigp/lighthouse:v5.3.0
    dataDir: /data/consensus
    flags:
      network: mainnet
      execution-endpoint: http://127.0.0.1:8551
      execution-jwt: /data/jwtsecret
      checkpoint-sync-url: https://mainnet.checkpoint.sigp.io
      http: "true"
      http-address: "127.0.0.1"
      http-port: "5052"
      metrics: "true"
      metrics-address: "127.0.0.1"
      metrics-port: "5054"
      port: "9000"
      target-peers: "100"
    ports:
      http: 5052
      p2p: 9000
      metrics: 5054

  network:
    firewall:
      rules:
        - description: "Reth metrics (localhost only)"
          port: 6060
          proto: tcp
          direction: inbound
          source: "127.0.0.1"
          action: allow
