name: geth-prysm
# Geth (EL) + Prysm (CL)
# Prysm is Go-based (Prysmatic Labs). Large installed base; good tooling.
# Note: Prysm uses a slightly different flag convention (--flag=value).
spec:
  execution:
    client: geth
    image: ethereum/client-go:v1.14.8
    dataDir: /data/execution
    flags:
      syncmode: snap
      cache: "4096"
      maxpeers: "100"
      http: "true"
      http.addr: "127.0.0.1"
      http.port: "8545"
      http.api: "eth,net,web3,engine,admin"
      authrpc.addr: "127.0.0.1"
      authrpc.port: "8551"
      authrpc.jwtsecret: /data/jwtsecret
      metrics: "true"
      metrics.addr: "127.0.0.1"
      metrics.port: "6060"
    ports:
      http: 8545
      p2p: 30303
      metrics: 6060

  consensus:
    client: prysm
    image: gcr.io/prysmaticlabs/prysm/beacon-chain:v5.1.0
    dataDir: /data/consensus
    flags:
      mainnet: "true"
      execution-endpoint: http://127.0.0.1:8551
      jwt-secret: /data/jwtsecret
      checkpoint-sync-url: https://beaconstate.info
      genesis-beacon-api-url: https://beaconstate.info
      rpc-host: "127.0.0.1"
      rpc-port: "4000"
      grpc-gateway-host: "127.0.0.1"
      grpc-gateway-port: "3500"
      monitoring-host: "127.0.0.1"
      monitoring-port: "8080"
      p2p-tcp-port: "9000"
      p2p-udp-port: "9000"
      p2p-max-peers: "100"
      accept-terms-of-use: "true"
    ports:
      http: 3500
      p2p: 9000
      metrics: 8080

  network:
    firewall:
      rules:
        - description: "Prysm metrics (localhost only)"
          port: 8080
          proto: tcp
          direction: inbound
          source: "127.0.0.1"
          action: allow
