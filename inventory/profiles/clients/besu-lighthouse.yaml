name: besu-lighthouse
# Besu (EL) + Lighthouse (CL)
# Besu is the Hyperledger/ConsenSys Java client. Enterprise-grade,
# excellent privacy/permissioning features. Supports Bonsai trie storage
# which dramatically reduces disk I/O vs full trie.
spec:
  execution:
    client: besu
    image: hyperledger/besu:24.10.0
    dataDir: /data/execution
    flags:
      network: mainnet
      data-path: /data/execution
      rpc-http-enabled: "true"
      rpc-http-host: "127.0.0.1"
      rpc-http-port: "8545"
      rpc-http-api: "ETH,NET,WEB3,ENGINE,ADMIN"
      rpc-ws-enabled: "true"
      rpc-ws-host: "127.0.0.1"
      rpc-ws-port: "8546"
      engine-rpc-enabled: "true"
      engine-host-allowlist: "127.0.0.1"
      engine-rpc-port: "8551"
      engine-jwt-secret: /data/jwtsecret
      # Bonsai trie: ~30% less disk vs forest mode
      data-storage-format: BONSAI
      bonsai-limit-trie-logs-enabled: "true"
      sync-mode: SNAP
      max-peers: "100"
      metrics-enabled: "true"
      metrics-host: "127.0.0.1"
      metrics-port: "6060"
      nat-method: DOCKER
      logging: INFO
    ports:
      http: 8545
      p2p: 30303
      metrics: 6060

  consensus:
    client: lighthouse
    image: sigp/lighthouse:v5.3.0
    dataDir: /data/consensus
    flags:
      network: mainnet
      execution-endpoint: http://127.0.0.1:8551
      execution-jwt: /data/jwtsecret
      checkpoint-sync-url: https://mainnet.checkpoint.sigp.io
      http: "true"
      http-address: "127.0.0.1"
      http-port: "5052"
      metrics: "true"
      metrics-address: "127.0.0.1"
      metrics-port: "5054"
      port: "9000"
    ports:
      http: 5052
      p2p: 9000
      metrics: 5054
