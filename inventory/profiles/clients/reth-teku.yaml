name: reth-teku
# Reth (EL) + Teku (CL)
# Good diversity choice: Rust EL + Java CL from different teams.
spec:
  execution:
    client: reth
    image: ghcr.io/paradigmxyz/reth:v1.1.0
    dataDir: /data/execution
    flags:
      chain: mainnet
      datadir: /data/execution
      http: "true"
      http.addr: "127.0.0.1"
      http.port: "8545"
      http.api: "eth,net,web3,engine,admin,txpool"
      authrpc.addr: "127.0.0.1"
      authrpc.port: "8551"
      authrpc.jwtsecret: /data/jwtsecret
      metrics: "127.0.0.1:6060"
      max-outbound-peers: "100"
    ports:
      http: 8545
      p2p: 30303
      metrics: 6060

  consensus:
    client: teku
    image: consensys/teku:24.10.0
    dataDir: /data/consensus
    flags:
      network: mainnet
      ee-endpoint: http://127.0.0.1:8551
      ee-jwt-secret-file: /data/jwtsecret
      initial-state: https://beaconstate.ethstaker.cc
      rest-api-enabled: "true"
      rest-api-interface: "127.0.0.1"
      rest-api-port: "5052"
      metrics-enabled: "true"
      metrics-interface: "127.0.0.1"
      metrics-port: "5054"
      p2p-port: "9000"
    ports:
      http: 5052
      p2p: 9000
      metrics: 5054
