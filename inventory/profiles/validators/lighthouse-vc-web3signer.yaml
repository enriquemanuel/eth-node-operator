name: lighthouse-vc-web3signer
# Lighthouse Validator Client + Web3Signer (remote signer)
#
# For institutional operators running thousands of validator keys.
# Keys never touch the validator client host — all signing goes through
# Web3Signer which holds the keys and handles slashing protection.
#
# Architecture:
#   Lighthouse VC → Web3Signer → Keys (keystore / Vault / HSM)
#   Lighthouse VC → Beacon Node (any client via standard API)
#
# Beacon node compatibility: identical to lighthouse-vc (all BNs work).
#
# Web3Signer handles:
#   - RANDAO reveals
#   - Block proposals
#   - Attestations
#   - Sync committee contributions
#   - Voluntary exits
#
# Override web3SignerURL and beaconNodes per-node or per-cluster.
spec:
  validator:
    enabled: true
    client: lighthouse
    image: sigp/lighthouse:v5.3.0
    dataDir: /data/validator
    beaconNodes:
      - http://127.0.0.1:5052
    # Override this per-node with your actual Web3Signer URL
    web3SignerURL: http://web3signer.internal:9000
    flags:
      network: mainnet
      datadir: /data/validator
      # Point to Web3Signer — Lighthouse discovers all keys via the API
      web3-signer-url: http://web3signer.internal:9000
      metrics: "true"
      metrics-address: "127.0.0.1"
      metrics-port: "5064"
      http: "true"
      http-address: "127.0.0.1"
      http-port: "5062"
      # Doppelganger protection — critical for large key sets
      enable-doppelganger-protection: "true"
      # How often to refresh the key list from Web3Signer
      # Useful when keys are added/removed without restarting the VC
      validator-registration-batch-size: "500"

  network:
    firewall:
      rules:
        - description: "Lighthouse VC metrics (localhost only)"
          port: 5064
          proto: tcp
          direction: inbound
          source: "127.0.0.1"
          action: allow
