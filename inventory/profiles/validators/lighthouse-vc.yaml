name: lighthouse-vc
# Lighthouse Validator Client
#
# The VC is separate from the beacon node. It connects to one or more BNs
# via the standard Beacon API (HTTP :5052). The VC does NOT care which
# client implementation the BN uses — all post-Merge BNs expose the
# same standard API.
#
# Lighthouse VC compatibility matrix (tested, production-grade):
#
#   VC: lighthouse-vc    BN: lighthouse BN  ✅ native — best tested
#   VC: lighthouse-vc    BN: teku BN        ✅ standard API — well tested in prod
#   VC: lighthouse-vc    BN: prysm BN       ✅ standard API — works
#   VC: lighthouse-vc    BN: nimbus BN      ✅ standard API — works
#   VC: lighthouse-vc    BN: lodestar BN    ✅ standard API — works
#
# Key advantage: Lighthouse VC supports multiple beacon node endpoints.
# Configure beaconNodes as a list — VC uses primary, falls back to others.
# This lets you run diverse BNs (e.g., lighthouse + teku) while keeping
# a single VC — maximising fault tolerance and client diversity.
#
# For 45k+ validators: pair with Web3Signer for distributed key management.
# Set web3SignerURL to your Web3Signer endpoint.
#
# Usage: add to a node's profiles list alongside a client pair.
# The beaconNodes list should reference your BN endpoints.
# Example:
#   profiles:
#     - mainnet-base
#     - geth-lighthouse
#     - lighthouse-vc        ← add this
#   spec:
#     validator:
#       beaconNodes:
#         - http://127.0.0.1:5052    # local BN (primary)
#         - http://10.1.1.2:5052     # remote BN (fallback)
#       web3SignerURL: http://web3signer.internal:9000

spec:
  validator:
    enabled: true
    client: lighthouse
    image: sigp/lighthouse:v5.3.0
    dataDir: /data/validator
    # beaconNodes defaults to local BN — override per-node for failover
    beaconNodes:
      - http://127.0.0.1:5052
    flags:
      network: mainnet
      beacon-nodes: http://127.0.0.1:5052
      datadir: /data/validator
      metrics: "true"
      metrics-address: "127.0.0.1"
      metrics-port: "5064"
      http: "true"
      http-address: "127.0.0.1"
      http-port: "5062"
      # Doppelganger protection — detects if keys are running elsewhere
      # before starting. Prevents slashing on failover. ALWAYS keep enabled.
      enable-doppelganger-protection: "true"
      # Graffiti in the graffiti file or inline
      # graffiti: "eth-node-operator"

  network:
    firewall:
      rules:
        - description: "Lighthouse VC metrics (localhost only)"
          port: 5064
          proto: tcp
          direction: inbound
          source: "127.0.0.1"
          action: allow
        - description: "Lighthouse VC HTTP API (localhost only)"
          port: 5062
          proto: tcp
          direction: inbound
          source: "127.0.0.1"
          action: allow
