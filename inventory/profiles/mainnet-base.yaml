name: mainnet-base
# Infrastructure profile — applies to every node regardless of client pair.
# Does NOT specify execution or consensus clients — those live in clients/*.
spec:
  system:
    packages:
      - name: docker-ce
        version: "26.1.4"
      - name: docker-compose-plugin
        version: "2.27.0"
      - name: ufw
        version: latest
      - name: chrony
        version: latest
      - name: mdadm
        version: latest
    kernel:
      parameters:
        vm.swappiness: "1"
        net.core.rmem_max: "134217728"
        net.core.wmem_max: "134217728"
        net.ipv4.tcp_rmem: "4096 87380 134217728"
        net.ipv4.tcp_wmem: "4096 65536 134217728"
        net.core.somaxconn: "65535"
    disk:
      raidLevel: 0
      arrayDevice: /dev/md0
      mountPath: /data
      fsType: ext4
      options: [noatime, nodiratime]

  network:
    firewall:
      provider: ufw
      policy: deny-by-default
      rules:
        - description: "SSH"
          port: 22
          proto: tcp
          direction: inbound
          action: allow
        - description: "ethagent API"
          port: 9000
          proto: tcp
          direction: inbound
          action: allow
        - description: "EL P2P TCP"
          port: 30303
          proto: tcp
          direction: inbound
          action: allow
        - description: "EL P2P UDP"
          port: 30303
          proto: udp
          direction: inbound
          action: allow
        - description: "CL P2P TCP"
          port: 9000
          proto: tcp
          direction: inbound
          action: allow
        - description: "CL P2P UDP"
          port: 9000
          proto: udp
          direction: inbound
          action: allow

  maintenance:
    window:
      schedule: "0 2 * * 0"
    upgradeStrategy:
      order: [cl, mev, el]
      preflightChecks: [elSynced, clSynced, peerCount]
    autoUpgrade:
      enabled: false
      packages: security-only
